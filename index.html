<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACES Education - Nền Tảng Luyện Thi Cao Cấp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#f5f3ff', 100: '#ede9fe', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95' },
                        math: { 500: '#3b82f6', 50: '#eff6ff', 100: '#dbeafe', 600: '#2563eb' },   
                        lit: { 500: '#f43f5e', 50: '#fff1f2', 100: '#ffe4e6', 600: '#e11d48' },    
                        eng: { 500: '#0ea5e9', 50: '#f0f9ff', 100: '#e0f2fe', 600: '#0284c7' },    
                    },
                    boxShadow: {
                        'premium': '0 4px 24px -6px rgba(0, 0, 0, 0.04), 0 12px 32px -4px rgba(0, 0, 0, 0.04)',
                        'premium-hover': '0 20px 40px -8px rgba(124, 58, 237, 0.12), 0 16px 24px -4px rgba(0, 0, 0, 0.04)',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #FAFAFA; }
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0, 0, 0, 0.05); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .card-premium { transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .card-premium:hover { transform: translateY(-6px); box-shadow: 0 20px 40px -8px rgba(0, 0, 0, 0.1); }
        .fade-in-up { animation: fadeInUp 0.6s ease-out forwards; opacity: 0; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .modal-overlay { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); }
        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans text-gray-800">

    <div id="toast-container" class="fixed bottom-6 right-6 z-[200] flex flex-col gap-3 pointer-events-none"></div>

    <!-- NAVBAR -->
    <nav class="glass-nav fixed top-0 w-full z-50">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.reload()">
                <div class="bg-indigo-600 text-white w-10 h-10 rounded-lg flex items-center justify-center shadow-md">
                    <i class="fa-solid fa-layer-group text-xl"></i>
                </div>
                <div class="flex flex-col leading-none">
                    <span class="font-black text-xl tracking-tight text-gray-900">ACES</span>
                    <span class="font-bold text-[9px] tracking-[0.25em] text-gray-500 uppercase mt-0.5">Education</span>
                </div>
            </div>
            
            <div id="auth-section">
                <button onclick="openModal('authModal')" class="bg-gray-900 text-white px-6 py-2.5 rounded-full font-bold hover:bg-indigo-600 transition-all text-sm">
                    Đăng nhập / Đăng ký
                </button>
            </div>
        </div>
    </nav>

    <main class="flex-grow pt-28 px-4 max-w-7xl mx-auto w-full mb-20">
        <div id="page-dethi" class="fade-in-up">
            <div class="bg-gradient-to-r from-indigo-900 to-purple-900 rounded-[2.5rem] p-10 text-white shadow-xl mb-12">
                <h1 class="text-4xl font-black mb-4">Xin chào sĩ tử!</h1>
                <p class="text-indigo-100 text-lg opacity-80">Hãy đăng nhập để lưu lại tiến độ luyện đề của bạn.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8" id="exam-container">
                <!-- Sẽ render bằng JS -->
            </div>
        </div>
    </main>

    <!-- AUTH MODAL -->
    <div id="authModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 modal-overlay">
        <div class="bg-white w-full max-w-[420px] rounded-[2rem] shadow-2xl overflow-hidden fade-in relative border border-gray-100">
            <button onclick="closeModal('authModal')" class="absolute top-5 right-5 text-gray-400 hover:text-gray-900 transition p-2 hover:bg-gray-100 rounded-full">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>

            <div class="p-8 sm:p-10">
                <div class="text-center mb-8">
                    <div class="inline-flex w-16 h-16 rounded-2xl bg-indigo-50 text-indigo-600 mb-5 items-center justify-center text-2xl">
                        <i id="auth-icon" class="fa-solid fa-shield-halved"></i>
                    </div>
                    <h2 id="auth-title" class="text-2xl font-black text-gray-900">Đăng nhập ACES</h2>
                    <p id="auth-subtitle" class="text-gray-500 mt-2 text-sm font-medium">Chọn phương thức thuận tiện nhất cho bạn</p>
                </div>

                <form id="auth-form" onsubmit="handleEmailAuth(event)" class="space-y-4">
                    <input type="email" id="auth-email" required placeholder="Email của bạn" class="w-full px-5 py-3.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition font-medium bg-gray-50">
                    <input type="password" id="auth-password" required placeholder="Mật khẩu" class="w-full px-5 py-3.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition font-medium bg-gray-50">
                    
                    <div id="auth-alert" class="hidden p-3 rounded-xl bg-red-50 text-red-600 text-xs font-bold border border-red-100 text-center animate-pulse"></div>

                    <button type="submit" id="auth-submit-btn" class="w-full bg-indigo-600 text-white py-3.5 rounded-xl font-bold text-base hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200">
                        Đăng nhập
                    </button>
                    
                    <div class="text-center mt-4">
                        <button type="button" onclick="toggleAuthMode()" id="auth-toggle-btn" class="text-sm font-bold text-indigo-600 hover:underline">
                            Chưa có tài khoản? Đăng ký ngay
                        </button>
                    </div>
                </form>

                <div class="relative my-8">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-100"></div></div>
                    <div class="relative flex justify-center text-[10px]"><span class="px-4 bg-white text-gray-400 font-black uppercase tracking-widest">Hoặc</span></div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button onclick="handleGoogleSignIn()" class="w-full border border-gray-200 py-3 rounded-xl flex items-center justify-center gap-2 font-bold text-gray-700 hover:bg-gray-50 transition text-sm">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5" alt="Google">
                        Google
                    </button>
                    
                    <button onclick="handleGuestSignIn()" class="w-full border border-emerald-100 bg-emerald-50 py-3 rounded-xl flex items-center justify-center gap-2 font-bold text-emerald-700 hover:bg-emerald-100 transition text-sm">
                        <i class="fa-solid fa-user-secret text-lg"></i>
                        Học thử
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getAuth, 
            onAuthStateChanged, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword, 
            signOut, 
            GoogleAuthProvider, 
            signInWithPopup, 
            signInAnonymously 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Cấu hình Firebase của bạn
        const firebaseConfig = {
            apiKey: "AIzaSyBdQyhBf-0U7J-FBd6GeXb06NBJCV5fwUk",
            authDomain: "aceseducation-d3f1f.firebaseapp.com",
            projectId: "aceseducation-d3f1f",
            storageBucket: "aceseducation-d3f1f.firebasestorage.app",
            messagingSenderId: "370171842720",
            appId: "1:370171842720:web:ad32154e8fd3901e6f79c5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        let isLoginMode = true;

        // --- THEO DÕI TRẠNG THÁI ---
        onAuthStateChanged(auth, (user) => {
            const authSection = document.getElementById('auth-section');
            if (user) {
                const name = user.isAnonymous ? "Sĩ tử ẩn danh" : (user.displayName || user.email);
                authSection.innerHTML = `
                    <div class="flex items-center gap-3 bg-white border border-gray-200 pl-2 pr-4 py-1.5 rounded-full shadow-sm">
                        <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold text-xs uppercase">
                            ${name.charAt(0)}
                        </div>
                        <span class="text-sm font-bold text-gray-700">${name.split('@')[0]}</span>
                        <button onclick="handleSignOut()" class="ml-2 text-gray-400 hover:text-red-500 transition-colors">
                            <i class="fa-solid fa-power-off"></i>
                        </button>
                    </div>
                `;
                closeModal('authModal');
                showToast(`Chào mừng bạn quay lại!`);
            } else {
                authSection.innerHTML = `
                    <button onclick="openModal('authModal')" class="bg-gray-900 text-white px-6 py-2.5 rounded-full font-bold hover:bg-indigo-600 transition-all text-sm">
                        Đăng nhập / Đăng ký
                    </button>
                `;
            }
        });

        // --- XỬ LÝ EMAIL/PASSWORD ---
        window.toggleAuthMode = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Đăng nhập ACES" : "Tạo tài khoản mới";
            document.getElementById('auth-submit-btn').innerText = isLoginMode ? "Đăng nhập" : "Đăng ký tài khoản";
            document.getElementById('auth-toggle-btn').innerText = isLoginMode ? "Chưa có tài khoản? Đăng ký ngay" : "Đã có tài khoản? Đăng nhập";
            document.getElementById('auth-alert').classList.add('hidden');
        };

        window.handleEmailAuth = async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const alertBox = document.getElementById('auth-alert');
            const btn = document.getElementById('auth-submit-btn');

            alertBox.classList.add('hidden');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang xác thực...';

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    await createUserWithEmailAndPassword(auth, email, password);
                    showToast("Tạo tài khoản thành công!");
                }
            } catch (error) {
                console.error(error);
                alertBox.innerText = translateError(error.code);
                alertBox.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerText = isLoginMode ? "Đăng nhập" : "Đăng ký tài khoản";
            }
        };

        // --- XỬ LÝ GOOGLE ---
        window.handleGoogleSignIn = async () => {
            const alertBox = document.getElementById('auth-alert');
            alertBox.classList.add('hidden');
            try {
                // Lưu ý quan trọng: Phải chạy Web qua Live Server để popup Google không bị chặn
                await signInWithPopup(auth, googleProvider);
            } catch (error) {
                console.error("Google Error:", error);
                if (error.code === 'auth/operation-not-allowed') {
                    alertBox.innerText = "Lỗi: Bạn chưa bật 'Google' trong tab Sign-in Method trên Firebase Console.";
                } else if (error.code === 'auth/unauthorized-domain') {
                    alertBox.innerText = "Lỗi: Domain này chưa được cấp phép trong Firebase. (Hãy thử chạy bằng Live Server)";
                } else {
                    alertBox.innerText = "Lỗi Google: " + error.message;
                }
                alertBox.classList.remove('hidden');
            }
        };

        // --- XỬ LÝ KHÁCH ---
        window.handleGuestSignIn = async () => {
            const alertBox = document.getElementById('auth-alert');
            alertBox.classList.add('hidden');
            try {
                await signInAnonymously(auth);
            } catch (error) {
                console.error("Guest Error:", error);
                if (error.code === 'auth/operation-not-allowed') {
                    alertBox.innerText = "Lỗi: Bạn chưa bật 'Anonymous' (Khách) trong tab Sign-in Method trên Firebase Console.";
                } else {
                    alertBox.innerText = "Lỗi đăng nhập Khách: " + error.message;
                }
                alertBox.classList.remove('hidden');
            }
        };

        window.handleSignOut = () => signOut(auth);

        // UI Helpers
        window.openModal = (id) => document.getElementById(id).classList.remove('hidden');
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');
        
        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = "bg-gray-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 animate-bounce";
            toast.innerHTML = `<i class="fa-solid fa-circle-check text-emerald-400"></i> <span class="font-bold text-sm">${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function translateError(code) {
            switch (code) {
                case 'auth/invalid-credential': return "Email hoặc mật khẩu không đúng.";
                case 'auth/email-already-in-use': return "Email này đã được đăng ký tài khoản khác.";
                case 'auth/weak-password': return "Mật khẩu quá yếu (cần tối thiểu 6 ký tự).";
                case 'auth/user-not-found': return "Không tìm thấy tài khoản với email này.";
                default: return "Có lỗi xảy ra, vui lòng thử lại sau.";
            }
        }
    </script>
</body>
</html>
